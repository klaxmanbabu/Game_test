<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Road Safety Quiz</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>Road Safety Quiz</h1>
      <p class="subtitle">You will get 5 random questions each time.</p>
    </header>

    <section id="startScreen" class="card">
      <div class="row">
        <label for="passMark"><strong>Pass mark (%)</strong></label>
        <input id="passMark" type="number" min="0" max="100" value="80" />
      </div>
      <div class="row">
        <button id="startBtn" class="primary">Start Quiz</button>
      </div>
      <p class="hint">
        Tip: Refreshing the page will generate a new random set of questions.
      </p>
    </section>

    <section id="quizScreen" class="card hidden" aria-live="polite">
      <div class="meta">
        <div id="progressText"></div>
        <div id="scoreSoFar"></div>
      </div>

      <div id="questionBlock" class="questionBlock"></div>

      <div class="actions">
        <button id="nextBtn" class="primary" disabled>Next</button>
      </div>
    </section>

    <section id="resultScreen" class="card hidden" aria-live="polite">
      <h2>Results</h2>
      <p id="resultSummary"></p>

      <details class="review">
        <summary>Review answers</summary>
        <div id="reviewBlock"></div>
      </details>

      <div class="actions">
        <button id="restartBtn">Play Again</button>
      </div>
    </section>

    <footer class="footer">
      <small>Hosted on GitHub Pages</small>
    </footer>
  </main>

  <script src="./questions.js"></script>
  <script src="./app.js"></script>
</body>
</html>
